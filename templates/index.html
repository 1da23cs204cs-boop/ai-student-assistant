<!DOCTYPE html>
<html>
<head>
    <title>AI Student Assistant</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
        }
        .box {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        button {
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h1>AI Student Assistant</h1>

<div class="box">
    <h3>Upload Notes</h3>
    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="file">
        <br>
        <button type="submit">Upload</button>
    </form>
</div>

<div class="box">
    <h3>Ask Question</h3>
    <form action="/ask" method="post">
        <input type="text" name="question" placeholder="Ask something">
        <br>
        <button type="submit">Ask</button>
    </form>
</div>

<div class="box">
    <h3>Summary</h3>
    <a href="/summary"><button>Generate Summary</button></a>
</div>

</body>
</html>
