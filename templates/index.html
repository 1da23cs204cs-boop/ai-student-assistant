<!DOCTYPE html>
<html>
<head>
    <title>AI Student Assistant</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            color: white;
        }

        .container {
            width: 600px;
            margin: auto;
            margin-top: 30px;
        }

        .box {
            background: white;
            color: black;
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
        }

        button {
            padding: 10px;
            margin-top: 10px;
            width: 100%;
        }

        input {
            padding: 10px;
            width: 95%;
        }

        #output {
            margin-top: 20px;
            background: white;
            color: black;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h1>📘 AI Student Assistant</h1>

<div class="container">

    <div class="box">
        <h3>Upload Notes</h3>
        <input type="file" id="file">
        <button onclick="uploadFile()">Upload</button>
    </div>

    <div class="box">
        <h3>Ask Question</h3>
        <input type="text" id="question" placeholder="Ask something">
        <button onclick="askQuestion()">Ask</button>
    </div>

    <div class="box">
        <button onclick="getSummary()">Summary</button>
        <button onclick="getFlashcards()">Flashcards</button>
        <button onclick="getQuiz()">Quiz</button>
    </div>

    <div id="output">Results will appear here...</div>

</div>

<script>
async function uploadFile() {
    let fileInput = document.getElementById("file");
    let formData = new FormData();
    formData.append("file", fileInput.files[0]);

    let res = await fetch("/upload", {
        method: "POST",
        body: formData
    });

    let text = await res.text();
    document.getElementById("output").innerHTML = text;
}

async function askQuestion() {
    let question = document.getElementById("question").value;

    let res = await fetch("/ask", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({question})
    });

    let text = await res.text();
    document.getElementById("output").innerHTML = text;
}

async function getSummary() {
    let res = await fetch("/summary");
    let text = await res.text();
    document.getElementById("output").innerHTML = text;
}

async function getFlashcards() {
    let res = await fetch("/flashcards");
    let text = await res.text();
    document.getElementById("output").innerHTML = text;
}

async function getQuiz() {
    let res = await fetch("/quiz");
    let text = await res.text();
    document.getElementById("output").innerHTML = text;
}
</script>

</body>
</html>
