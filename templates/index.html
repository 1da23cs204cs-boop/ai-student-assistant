<!DOCTYPE html>
<html>
<head>
    <title>AI Student Assistant</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            color: white;
        }

        .container {
            width: 500px;
            margin: auto;
            margin-top: 50px;
        }

        .box {
            background: white;
            color: black;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        input, button {
            padding: 10px;
            margin-top: 10px;
            width: 90%;
        }

        button {
            background: #4facfe;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #007bff;
        }
    </style>
</head>

<body>

<h1>📘 AI Student Assistant</h1>

<div class="container">

    <div class="box">
        <h3>Upload Notes</h3>
        <form action="/upload" method="post" enctype="multipart/form-data">
            <input type="file" name="file">
            <button type="submit">Upload</button>
        </form>
    </div>

    <div class="box">
        <h3>Ask Question</h3>
        <form action="/ask" method="post">
            <input type="text" name="question" placeholder="Ask from your notes">
            <button type="submit">Ask</button>
        </form>
    </div>

    <div class="box">
        <h3>Summary</h3>
        <a href="/summary"><button>Generate Summary</button></a>
    </div>

    <div class="box">
        <h3>Flashcards</h3>
        <a href="/flashcards"><button>Generate Flashcards</button></a>
    </div>

    <div class="box">
        <h3>Quiz</h3>
        <a href="/quiz"><button>Generate Quiz</button></a>
    </div>

</div>

</body>
</html>
